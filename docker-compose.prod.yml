# Production-like stack — standalone app + db. Exactly two services.
# Usage: docker compose -f docker-compose.prod.yml up --build
# The app entrypoint runs `prisma migrate deploy` before starting.
services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-abad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-abad}
    volumes:
      # PostgreSQL 18 expects the volume at /var/lib/postgresql, not directly at
      # /var/lib/postgresql/data. Mounting the parent keeps `docker compose up`
      # working on fresh machines without pg_upgrade layout errors.
      - abad-pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-abad} -d ${POSTGRES_DB:-abad}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      target: runner
      # Use the host network during image build so Docker DNS hiccups do not
      # break Corepack/pnpm or package registry access on Linux workstations.
      network: host
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-abad}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-abad}?schema=public
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET}
      ATHENEA_SEX_EXPORT_KEY: ${ATHENEA_SEX_EXPORT_KEY:-SEXO}
      ATHENEA_DATE_FORMAT: ${ATHENEA_DATE_FORMAT:-yyyy-MM-dd}
      EXPORT_API_KEY: ${EXPORT_API_KEY:-}
      # Set to "true" to seed catalogs/mapping/demo data on a fresh DB.
      RUN_SEED_ON_START: ${RUN_SEED_ON_START:-false}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  abad-pg18-data:
